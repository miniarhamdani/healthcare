worker_processes  1;

error_log /usr/local/openresty/nginx/logs/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include /usr/local/openresty/nginx/conf/mime.types;
  default_type  application/octet-stream;

  log_format dr '$remote_addr - $remote_user [$time_local] '
                '"$request" $status $body_bytes_sent '
                '"$http_referer" "$http_user_agent" '
                'active_region=$sent_http_x_active_region upstream=$upstream_addr';

  access_log /usr/local/openresty/nginx/logs/access.log dr;

  sendfile        on;
  keepalive_timeout  65;

  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 2s;

  lua_shared_dict dr_state 10m;

  init_worker_by_lua_block {
    local dict = ngx.shared.dr_state

    local function check_backend(host, port, path)
      local sock = ngx.socket.tcp()
      sock:settimeout(1500)

      local ok, err = sock:connect(host, port)
      if not ok then
        return false, err
      end

      local req = "GET " .. path .. " HTTP/1.1\r\n" ..
                  "Host: " .. host .. "\r\n" ..
                  "Connection: close\r\n\r\n"

      local bytes, send_err = sock:send(req)
      if not bytes then
        sock:close()
        return false, send_err
      end

      local line, recv_err = sock:receive("*l")
      sock:close()
      if not line then
        return false, recv_err
      end

      local status = tonumber(line:match("%s(%d%d%d)%s"))
      if status ~= 200 then
        return false, "status=" .. tostring(status)
      end

      return true
    end

    local function tick(premature)
      if premature then return end

      local active = dict:get("active_region") or "primary"
      local p_fail = dict:get("primary_fail") or 0

      local ok_primary = check_backend("primary-app", 3000, "/health")

      if ok_primary then
        p_fail = 0
      else
        p_fail = p_fail + 1
      end

      dict:set("primary_fail", p_fail)

      if active == "primary" then
        if p_fail >= 3 then
          dict:set("active_region", "secondary")
          ngx.log(ngx.WARN, "failover: switching to secondary (primary_fail=", p_fail, ")")
        end
      end

      local ok, terr = ngx.timer.at(5, tick)
      if not ok then
        ngx.log(ngx.ERR, "failed to reschedule health timer: ", terr)
      end
    end

    dict:set("active_region", dict:get("active_region") or "primary")
    ngx.timer.at(0, tick)
  }

  server {
    listen 80;

    location = /nginx-health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location = /health {
      content_by_lua_block {
        local dict = ngx.shared.dr_state
        local active = dict:get("active_region") or "primary"
        ngx.header["X-Active-Region"] = active
        ngx.header["Content-Type"] = "text/plain"
        ngx.say("ok")
      }
    }

    location /api/ {
      set $active_region "primary";
      set $backend "primary-app:3000";

      access_by_lua_block {
        local dict = ngx.shared.dr_state
        local active = dict:get("active_region") or "primary"
        ngx.var.active_region = active

        if active == "secondary" then
          ngx.var.backend = "secondary-app:3000"
        else
          ngx.var.backend = "primary-app:3000"
        end
      }

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;

      add_header X-Active-Region $active_region always;

      proxy_pass http://$backend;
    }

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://frontend-app:80;
    }
  }
}
