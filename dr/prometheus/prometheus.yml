global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: primary-app
    metrics_path: /metrics
    static_configs:
      - targets: ['primary-app:3000']

  - job_name: secondary-app
    metrics_path: /metrics
    static_configs:
      - targets: ['secondary-app:3000']

  - job_name: mongodb-exporter
    static_configs:
      - targets: ['mongodb-exporter:9216']
